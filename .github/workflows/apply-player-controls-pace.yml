name: Apply player controls and pace patches

on:
  push:
    branches: [feat/unique-players-desktop-controls-pace]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[player-patch]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/unique-players-desktop-controls-pace
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply source patches
        run: node scripts/apply-player-controls-pace.mjs

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Commit patched source
        run: |
          git config user.name "Goal League Automation"
          git config user.email "actions@users.noreply.github.com"
          git add src scripts/capture-pages.mjs docs/superpowers/specs/2026-07-17-player-identity-controls-pace-design.md
          if git diff --cached --quiet; then
            echo "No source changes to commit"
            exit 0
          fi
          git commit -m "feat: wire unique players controls and faster gameplay [player-patch]"
          git push origin HEAD:feat/unique-players-desktop-controls-pace
